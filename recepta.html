<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedWest Hospital — Recepta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">
    <img src="assets/img/logo.png" alt="MedWest Logo">
</div>
        <div>
          <h1>Recepta medyczna</h1>
          <p>Generator dokumentu recepty</p>
        </div>
      </div>
      <nav class="nav">
        <a href="centrum.html">Centrum</a>
        <a href="index.html">Taryfikator</a>
      </nav>
    </header>

    <section class="panel">
      <div class="panel-title">
        <div>
          <h2>Dane recepty</h2>
          <p>Wypełnij formularz i wygeneruj czytelny dokument do skopiowania.</p>
        </div>
        <div id="clock" style="color:var(--muted)"></div>
      </div>

      <div class="form-grid">
        <div class="field"><label>Pacjent</label><input type="text" id="patient" placeholder="Imię i nazwisko"></div>
        <div class="field"><label>Lekarz</label><input type="text" id="doctor" placeholder="Lekarz dyżurny"></div>
        <div class="field"><label>Lek</label><select id="medicine"><optgroup label="Leki przeciwbólowe"><option>Paracetamol</option><option>Ibuprofen</option><option>Aspirin</option><option>Morphine</option></optgroup><optgroup label="Antybiotyki"><option>Amoxicillin</option><option>Azithromycin</option><option>Doxycycline</option></optgroup><optgroup label="Psychiatryczne"><option>Diazepam</option><option>Sertraline</option><option>Escitalopram</option></optgroup><optgroup label="Kardiologiczne"><option>Nitroglycerin</option><option>Warfarin</option></optgroup><optgroup label="Ratunkowe"><option>Epinephrine</option><option>Saline IV</option><option>Ketamine</option></optgroup></select></div>
        <div class="field"><label>Ilość opakowań</label><input type="number" id="packs" value="1" min="1" max="10"></div>
        <div class="field"><label>Dawkowanie</label><input type="text" id="dosage" placeholder="np. 1 tabletka co 8 godzin"></div>
        <div class="field"><label>Czas terapii</label><input type="text" id="duration" placeholder="np. 7 dni"></div>
        <div class="field"><label>Typ recepty</label><select id="priority"><option>Standardowa</option><option>Pilna</option><option>Kontynuacja leczenia</option></select></div>
        <div class="field"><label>Ważność</label><select id="validity"><option>7 dni</option><option>14 dni</option><option selected>30 dni</option><option>90 dni</option></select></div>
        <div class="field full"><label>Gotowe zalecenia</label><select id="presetNotes" onchange="applyPresetNotes()"><option value="">Wybierz i dodaj zalecenie...</option><option value="Przyjmować po posiłku.">Przyjmować po posiłku</option><option value="Nie spożywać alkoholu podczas terapii.">Zakaz alkoholu</option><option value="Unikać prowadzenia pojazdów i obsługi maszyn.">Nie prowadzić pojazdów</option><option value="Zgłosić się na kontrolę za 7 dni.">Kontrola za 7 dni</option><option value="Przerwać terapię w przypadku reakcji alergicznej i zgłosić się do lekarza.">Reakcja alergiczna</option></select></div>
        <div class="field full"><label>Zalecenia lekarza</label><textarea id="notes" placeholder="Dodatkowe zalecenia..."></textarea></div>
      </div>
      <button class="primary-btn" style="width:100%;margin-top:18px" onclick="generatePrescription()">Generuj receptę</button>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/prescription.js"></script>
</body>
</html>
